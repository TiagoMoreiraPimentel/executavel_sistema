        // Resolve os datasets nodes/edges do PyVis (várias heurísticas)
        function resolveDatasets() {
            var resolved = { nodes: null, edges: null };
            try {
                if (typeof window.nodes !== 'undefined' && typeof window.edges !== 'undefined') {
                    resolved.nodes = window.nodes;
                    resolved.edges = window.edges;
                } else if (typeof nodes !== 'undefined' && typeof edges !== 'undefined') {
                    resolved.nodes = nodes;
                    resolved.edges = edges;
                } else if (typeof network !== 'undefined' && network && network.body && network.body.data) {
                    resolved.nodes = network.body.data.nodes;
                    resolved.edges = network.body.data.edges;
                } else {
                    for (var k in window) {
                        try {
                            var v = window[k];
                            if (v && typeof v.get === 'function' && typeof v.add === 'function') {
                                if (!resolved.nodes) resolved.nodes = v;
                                else if (!resolved.edges) resolved.edges = v;
                            }
                        } catch(e) {}
                        if (resolved.nodes && resolved.edges) break;
                    }
                }
            } catch (e) {
                console.warn("Erro ao resolver datasets:", e);
            }
            return resolved;

        // Aguarda o objeto 'network' e os datasets estarem prontos
        function waitForNetwork(callback, timeoutMs) {
            var start = Date.now();
            (function check() {
                if (typeof network !== 'undefined' && network && (typeof window.nodes !== 'undefined' || (network.body && network.body.data))) {
                    callback();
                } else {
                    if (Date.now() - start > (timeoutMs || 5000)) {
                        console.error("Tempo esgotado esperando o objeto 'network' do PyVis.");
                    } else {
                        setTimeout(check, 100);
                    }
                }
            })();

                        nodeUpdates.push({ id: n.id, color: color, size: size, font: { color: '#ffffff', bold: false } });

                    nodes.update(nodeUpdates);

            // Função que destaca um nó único (usada ao clicar)
            function highlightSingleNode(nodeId) {
                // Limpa seleções antes de começar (fundamental para evitar o cinza)
                if (typeof network !== 'undefined' && network) {
                    network.unselectAll();
                }
                resetGraph(); 

                try {
                    // Destaque do nó (amarelo)

                    console.warn("Erro ao destacar nó único:", e);

                try {

                    var nodeUpdates = [];
                    var edgeUpdates = [];
                    var edgesToSelect = [];

                    connectedNodes.forEach(function(adjNodeId) {
                        if (adjNodeId != nodeId) {
                            // Destaque de adjacentes
                            nodeUpdates.push({ id: adjNodeId, color: highlightNodeColor, size: adjNodeSize, font: { color: '#ffffff' } });
                        }
                    });
                    nodes.update(nodeUpdates);

                    connectedEdges.forEach(function(edgeId) {
                        // FORÇA A COR VERDE NO DATASET DA ARESTA E APLICA O ESTILO DE FONTE DESTAQUE
                        edgeUpdates.push({ 
                            id: edgeId, 
                            color: { color: highlightEdgeColor }, 
                            width: highlightEdgeWidth, 
                            font: edgeHighlightFontOptions
                        });
                        edgesToSelect.push(edgeId);
                    });
                    edges.update(edgeUpdates); // Atualiza o Dataset primeiro

                    network.selectEdges(edgesToSelect);

            // Função de busca/destaque por texto (substring) - seleciona TODOS os matches

                // Limpa seleções

                    console.warn("Erro ao iterar nodes.get():", e);

                        var connectedNodes = network.getConnectedNodes(node.id);

                        var nodeUpdates = [];

                        connectedNodes.forEach(function(adjNodeId) {
                            if (adjNodeId != node.id) {

                            }
                        });
                        nodes.update(nodeUpdates);

                        connectedEdges.forEach(function(edgeId) {
                            // FORÇA A COR VERDE NO DATASET DA ARESTA
                            edgeUpdates.push({ 
                                id: edgeId, 
                                color: { color: highlightEdgeColor }, 
                                width: highlightEdgeWidth, 
                                font: edgeHighlightFontOptions
                            });
                            edgesToSelect.push(edgeId);
                        });
                        edges.update(edgeUpdates); // Atualiza o Dataset primeiro

                        network.selectEdges(edgesToSelect); // Seleciona para 'travar' o estilo
                    } catch(e) {
                        console.warn("Erro ao destacar conexões do único match:", e);
                    }

                    // foco suave no único
                    try {
                        network.focus(node.id, { scale: 1.3, animation: true });
                    } catch(e) { /* ignore */ }

                    document.getElementById('searchStatus').innerHTML = '<span style="color: ' + highlightEdgeColor + ';">1 pessoa encontrada</span>';
                    return;
                }

                // Caso múltiplos matches -> destacar todos e enquadrar
                var nodeUpdates = [];
                var edgeUpdates = [];

                var matchedIds = matched.map(function(n){ return n.id; });

                matched.forEach(function(n) {
                    // Destaque dos nós
                    nodeUpdates.push({ id: n.id, color: highlightNodeColor, size: adjNodeSize, font: { color: '#ffffff' } });
                });
                nodes.update(nodeUpdates);

                // Destaca arestas que conectam a qualquer nó encontrado
                try {
                    var allEdges = edges.get();
                    allEdges.forEach(function(e) {
                        if (matchedIds.indexOf(e.from) !== -1 || matchedIds.indexOf(e.to) !== -1) {
                            // FORÇA A COR VERDE NO DATASET DA ARESTA
                            edgeUpdates.push({ 
                                id: e.id, 
                                color: { color: highlightEdgeColor }, 
                                width: highlightEdgeWidth, 
                                font: edgeHighlightFontOptions
                            });
                            edgesToSelect.push(e.id);
                        }
                    });
                    edges.update(edgeUpdates); // Atualiza o Dataset primeiro

                    network.selectEdges(edgesToSelect); // Seleciona para 'travar' o estilo
                } catch(e) {
                    console.warn("Erro ao destacar arestas para múltiplos matches:", e);
                }

                // Enquadrar grupo: calcula bounding box média e faz moveTo com scale razoável
                try {
                    var positions = network.getPositions(matchedIds);
                    var xs = matchedIds.map(function(id){ return positions[id].x; });
                    var ys = matchedIds.map(function(id){ return positions[id].y; });
                    var minX = Math.min.apply(null, xs);
                    var maxX = Math.max.apply(null, xs);
                    var minY = Math.min.apply(null, ys);
                    var maxY = Math.max.apply(null, ys);
                    var centerX = (minX + maxX) / 2;
                    var centerY = (minY + maxY) / 2;

                    var dx = maxX - minX;
                    var dy = maxY - minY;
                    var extent = Math.max(dx, dy);
                    var scale = 0.9;
                    if (extent > 0) {
                        scale = Math.max(0.3, Math.min(1.4, 700 / extent));
                    }
                    network.moveTo({ position: { x: centerX, y: centerY }, scale: scale, animation: true });
                } catch(e) {
                    console.warn("Erro ao enquadrar múltiplos matches:", e);
                }

                document.getElementById('searchStatus').innerHTML = '<span style="color: ' + highlightEdgeColor + ';">' + matched.length + ' pessoas encontradas</span>';
            }

            var searchBtn = document.getElementById('searchBtn');
            var resetBtn = document.getElementById('resetBtn');
            var searchBox = document.getElementById('searchBox');

            if (searchBtn) searchBtn.addEventListener('click', searchNode);

            if (searchBox) {
                searchBox.addEventListener('keyup', function(e) {
                    if (e.key === 'Enter') searchNode();
                });

                    var selectedNodeId = params.nodes[0];
