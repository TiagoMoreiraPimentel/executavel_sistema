    <div style="padding: 20px 25px; background: #333; color: white; border-bottom: 2px solid #555; z-index: 100;">
        <!-- Linha superior: Busca e Legenda -->
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px;">
            <!-- Grupo de busca com espaçamentos individuais -->
            <div style="display: flex; align-items: center;">
                <!-- Label "Buscar" -->
                <label for="searchBox" style="font-size: 1.1em; font-weight: bold; margin-right: 15px;">🔎 Buscar:</label>

                <!-- Campo de busca -->
                <input type="text" id="searchBox" placeholder="Nome ou CPF" 
                       style="padding: 10px 15px; width: 300px; border: 1px solid #666; border-radius: 6px; 
                              background: #444; color: white; font-size: 1em; margin-right: 20px;">

                <!-- Botão Buscar -->
                <button id="searchBtn" 
                        style="padding: 10px 25px; background: #007bff; color: white; border: none; 
                               border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1em;
                               margin-right: 25px; transition: background 0.2s;"
                        onmouseover="this.style.background='#0056b3'" 
                        onmouseout="this.style.background='#007bff'">
                    Buscar
                </button>

                <!-- Botão Limpar -->
                <button id="resetBtn" 
                        style="padding: 10px 25px; background: #dc3545; color: white; border: none; 
                               border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1em;
                               margin-right: 30px; transition: background 0.2s;"
                        onmouseover="this.style.background='#c82333'" 
                        onmouseout="this.style.background='#dc3545'">
                    Limpar
                </button>

                <!-- Status da busca -->
                <span id="searchStatus" style="font-weight: bold; font-size: 1em;"></span>
            </div>

            <!-- Legenda -->
            <div style="font-size: 1em; display: flex; gap: 30px; background: #444; padding: 8px 20px; border-radius: 25px;">
                <span style="display: flex; align-items: center;">
                    <span style="display: inline-block; width: 14px; height: 14px; border-radius: 50%; 
                                 background-color: #139DD4; margin-right: 8px;"></span>
                    Colaborador (RE)
                </span>
                <span style="display: flex; align-items: center;">
                    <span style="display: inline-block; width: 14px; height: 14px; border-radius: 50%; 
                                 background-color: #079606; margin-right: 8px;"></span>
                    Motorista (CPF)
                </span>
            </div>
        </div>

        <!-- Controles de nível com setas -->
        <div id="levelControls" style="display: none; align-items: center; gap: 25px; padding: 15px 20px; 
                                       background: #444; border-radius: 40px; margin-top: 10px;">
            <span style="font-weight: bold; font-size: 1.1em;">📊 Níveis de relacionamento:</span>

            <div style="display: flex; align-items: center; gap: 20px; background: #555; padding: 5px 20px; border-radius: 30px;">
                <!-- Botão diminuir nível -->
                <button id="levelDownBtn" 
                        style="background: none; border: none; color: white; font-size: 24px; 
                               cursor: pointer; width: 40px; height: 40px; display: flex; 
                               align-items: center; justify-content: center; border-radius: 50%;
                               transition: background 0.2s;"
                        onmouseover="this.style.background='#666'" 
                        onmouseout="this.style.background='none'">
                    ⬅️
                </button>

                <!-- Indicador de nível atual -->
                <div style="display: flex; align-items: baseline; gap: 5px; min-width: 100px; justify-content: center;">
                    <span id="currentLevel" style="font-size: 24px; font-weight: bold; color: #ffc107;">1</span>
                    <span style="font-size: 18px; color: #aaa;">/</span>
                    <span id="maxLevel" style="font-size: 18px; color: #aaa;">5</span>
                </div>

                <!-- Botão aumentar nível -->
                <button id="levelUpBtn" 
                        style="background: none; border: none; color: white; font-size: 24px; 
                               cursor: pointer; width: 40px; height: 40px; display: flex; 
                               align-items: center; justify-content: center; border-radius: 50%;
                               transition: background 0.2s;"
                        onmouseover="this.style.background='#666'" 
                        onmouseout="this.style.background='#none'">
                    ➡️
                </button>
            </div>

            <button id="expandAllBtn" 
                    style="padding: 8px 25px; background: #28a745; color: white; border: none; 
                           border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 1em;
                           transition: background 0.2s; margin-left: 10px;"
                    onmouseover="this.style.background='#218838'" 
                    onmouseout="this.style.background='#28a745'">
                Expandir todos
            </button>
        </div>
    </div>
    <div id="mynetwork" style="height: calc(100vh - 150px);"></div>

        // Calcula níveis a partir de um nó
        function calculateLevels(rootId) {
            var visited = new Set();
            var queue = [[rootId, 0]];
            var levels = {};

            visited.add(rootId);
            levels[rootId] = 0;

            while (queue.length > 0) {
                var [current, level] = queue.shift();

                    connected.forEach(function(neighbor) {
                        if (!visited.has(neighbor)) {
